name: Validate

on:
  push:
    paths: ["agent/**", "broker/**"]
  pull_request:
    paths: ["agent/**", "broker/**"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Worker syntax
        run: node --check agent/src/index.js
      - name: Embedded client script
        run: node agent/validate.js
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Broker syntax
        run: python -m py_compile broker/app.py
