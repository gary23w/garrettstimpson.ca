name: Regenerate llms.txt

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  push:
    # Also run whenever a post is added or edited
    paths:
      - "_posts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-llms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Use GITHUB_TOKEN with write permissions (enforce_admins: false)
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f  # v5.3.0
        with:
          python-version: "3.12"

      - name: Regenerate llms.txt
        run: python3 build_llms.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          # Only commit if there is actually a diff
          if git diff --cached --quiet; then
            echo "llms.txt unchanged — nothing to commit."
          else
            COUNT=$(grep -c '<DOCUMENT' llms.txt || true)
            git commit -m "chore(llms): regenerate corpus — ${COUNT} documents [skip ci]"
            git push
          fi
