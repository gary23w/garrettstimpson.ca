name: Regenerate llms.txt

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths:
      - "_posts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-llms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Regenerate llms.txt
        run: python3 build_llms.py

      - name: Commit and push if changed
        run: |
          git config user.name  "gary23w"
          git config user.email "garystimpson03@gmail.com"
          git add llms.txt
          if git diff --cached --quiet; then
            echo "llms.txt unchanged — nothing to commit."
          else
            COUNT=$(grep -c '<DOCUMENT' llms.txt || true)
            git commit -m "chore(llms): regenerate corpus — ${COUNT} documents [skip ci]"
            git pull --rebase origin main
            git push
          fi
