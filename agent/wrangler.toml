name = "garrettstimpson-agent"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Bundle neuron-db's Rust core (compiled to wasm32-unknown-unknown) as a CompiledWasm
# module so `import NDB_WASM from "./neuron_core.wasm"` resolves to a WebAssembly.Module.
# This is the in-Worker memory engine: corpus recall (RAG) + per-session memory, all
# driven through the wasm `mem()` op surface. No external service, no network at recall time.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Workers AI — free tier, no API key required. Drives the chat model (picked at runtime
# from a Workers-AI catalog mirroring neuron-db's lab model picker; defaults to llama-3.1-8b)
# and the embedding model (bge-base-en-v1.5, retained only for the optional Vectorize path).
[ai]
binding = "AI"

[vars]
LLMS_URL  = "https://raw.githubusercontent.com/gary23w/garrettstimpson.ca/refs/heads/main/llms.txt"
SITE_NAME = "Garrett Stimpson Security Research"
ACCESS_USER     = ""      # optional login username (blank = password only)
ACCESS_PASSWORD = ""      # set a value here to lock the agent behind a login (blank = open access)
# Optional reliable search (set as secrets or here): GOOGLE_CSE_KEY + GOOGLE_CSE_CX, or BING_API_KEY.
# Without them, web_search falls back to keyless SearXNG/DuckDuckGo/Wikipedia (less reliable from Workers).
# For better secrecy, leave ACCESS_PASSWORD = "" above and instead run:
#   wrangler secret put ACCESS_PASSWORD   (a secret overrides this var and is not stored in the repo)

# Daily reindex of the Vectorize index, 1h after llms.txt regenerates (06:00 UTC).
# No-op when the VECTORIZE binding below is not enabled.
[triggers]
crons = ["0 7 * * *"]

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL — semantic RAG via Vectorize. The worker runs fine without this
# (it falls back to in-worker BM25 over chunks). To enable full semantic search:
#
#   1) wrangler vectorize create gsa-corpus --dimensions=768 --metric=cosine
#   2) uncomment the block below
#   3) wrangler deploy
#   4) curl -X POST https://<your-worker>/api/reindex     # one-time index build
#
# [[vectorize]]
# binding    = "VECTORIZE"
# index_name = "gsa-corpus"
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL — persistent conversation memory via Workers KV. Without this the
# agent still works, but conversations live only in the browser tab. To enable:
#
#   1) wrangler kv namespace create SESSIONS
#   2) paste the returned id below and uncomment the block
#   3) wrangler deploy
#
# [[kv_namespaces]]
# binding = "SESSIONS"
# id      = "<paste-kv-namespace-id-here>"
# ─────────────────────────────────────────────────────────────────────────────
