<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon green glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <!-- Radial vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" fill="#000000" rx="24"/>

  <!-- Subtle dark green tint bg -->
  <rect width="512" height="512" fill="#001a00" rx="24" opacity="0.6"/>

  <!-- Hex grid background (faint) -->
  <g opacity="0.07" stroke="#00ff41" stroke-width="1" fill="none">
    <!-- Row 1 -->
    <polygon points="60,30 90,48 90,84 60,102 30,84 30,48"/>
    <polygon points="120,30 150,48 150,84 120,102 90,84 90,48"/>
    <polygon points="180,30 210,48 210,84 180,102 150,84 150,48"/>
    <polygon points="240,30 270,48 270,84 240,102 210,84 210,48"/>
    <polygon points="300,30 330,48 330,84 300,102 270,84 270,48"/>
    <polygon points="360,30 390,48 390,84 360,102 330,84 330,48"/>
    <polygon points="420,30 450,48 450,84 420,102 390,84 390,48"/>
    <polygon points="480,30 510,48 510,84 480,102 450,84 450,48"/>
    <!-- Row 2 (offset) -->
    <polygon points="30,102 60,120 60,156 30,174 0,156 0,120"/>
    <polygon points="90,102 120,120 120,156 90,174 60,156 60,120"/>
    <polygon points="150,102 180,120 180,156 150,174 120,156 120,120"/>
    <polygon points="210,102 240,120 240,156 210,174 180,156 180,120"/>
    <polygon points="270,102 300,120 300,156 270,174 240,156 240,120"/>
    <polygon points="330,102 360,120 360,156 330,174 300,156 300,120"/>
    <polygon points="390,102 420,120 420,156 390,174 360,156 360,120"/>
    <polygon points="450,102 480,120 480,156 450,174 420,156 420,120"/>
    <!-- Row 3 -->
    <polygon points="60,174 90,192 90,228 60,246 30,228 30,192"/>
    <polygon points="120,174 150,192 150,228 120,246 90,228 90,192"/>
    <polygon points="180,174 210,192 210,228 180,246 150,228 150,192"/>
    <polygon points="240,174 270,192 270,228 240,246 210,228 210,192"/>
    <polygon points="300,174 330,192 330,228 300,246 270,228 270,192"/>
    <polygon points="360,174 390,192 390,228 360,246 330,228 330,192"/>
    <polygon points="420,174 450,192 450,228 420,246 390,228 390,192"/>
    <!-- Row 4 (offset) -->
    <polygon points="30,246 60,264 60,300 30,318 0,300 0,264"/>
    <polygon points="90,246 120,264 120,300 90,318 60,300 60,264"/>
    <polygon points="150,246 180,264 180,300 150,318 120,300 120,264"/>
    <polygon points="210,246 240,264 240,300 210,318 180,300 180,264"/>
    <polygon points="270,246 300,264 300,300 270,318 240,300 240,264"/>
    <polygon points="330,246 360,264 360,300 330,318 300,300 300,264"/>
    <polygon points="390,246 420,264 420,300 390,318 360,300 360,264"/>
    <polygon points="450,246 480,264 480,300 450,318 420,300 420,264"/>
    <!-- Row 5 -->
    <polygon points="60,318 90,336 90,372 60,390 30,372 30,336"/>
    <polygon points="120,318 150,336 150,372 120,390 90,372 90,336"/>
    <polygon points="180,318 210,336 210,372 180,390 150,372 150,336"/>
    <polygon points="240,318 270,336 270,372 240,390 210,372 210,336"/>
    <polygon points="300,318 330,336 330,372 300,390 270,372 270,336"/>
    <polygon points="360,318 390,336 390,372 360,390 330,372 330,336"/>
    <polygon points="420,318 450,336 450,372 420,390 390,372 390,336"/>
    <!-- Row 6 (offset) -->
    <polygon points="30,390 60,408 60,444 30,462 0,444 0,408"/>
    <polygon points="90,390 120,408 120,444 90,462 60,444 60,408"/>
    <polygon points="150,390 180,408 180,444 150,462 120,444 120,408"/>
    <polygon points="210,390 240,408 240,444 210,462 180,444 180,408"/>
    <polygon points="270,390 300,408 300,444 270,462 240,444 240,408"/>
    <polygon points="330,390 360,408 360,444 330,462 300,444 300,408"/>
    <polygon points="390,390 420,408 420,444 390,462 360,444 360,408"/>
    <polygon points="450,390 480,408 480,444 450,462 420,444 420,408"/>
  </g>

  <!-- Outer shield shape -->
  <path d="M256 40 L420 110 L420 270 Q420 370 256 470 Q92 370 92 270 L92 110 Z"
        fill="none" stroke="#00ff41" stroke-width="3" opacity="0.25"/>

  <!-- Inner shield glow -->
  <path d="M256 60 L400 122 L400 268 Q400 355 256 445 Q112 355 112 268 L112 122 Z"
        fill="rgba(0,255,65,0.04)" stroke="#00ff41" stroke-width="1.5" opacity="0.4"
        filter="url(#glow)"/>

  <!-- MAIN TERMINAL PROMPT  >_  -->
  <!-- The ">" caret -->
  <g filter="url(#glow-strong)">
    <!-- > arrow made of two thick strokes -->
    <polyline points="145,200 225,256 145,312"
              fill="none" stroke="#00ff41" stroke-width="32" stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- _ underscore / cursor block -->
    <rect x="245" y="292" width="122" height="28" fill="#00ff41" rx="2"/>
  </g>

  <!-- Scanline overlay -->
  <rect width="512" height="512" fill="url(#scanlines)" rx="24" opacity="1"/>

  <!-- Vignette overlay -->
  <rect width="512" height="512" fill="url(#vignette)" rx="24"/>

  <!-- Corner bracket decorations -->
  <g stroke="#00ff41" stroke-width="3" fill="none" opacity="0.5">
    <!-- Top-left -->
    <polyline points="20,50 20,20 50,20"/>
    <!-- Top-right -->
    <polyline points="462,20 492,20 492,50"/>
    <!-- Bottom-left -->
    <polyline points="20,462 20,492 50,492"/>
    <!-- Bottom-right -->
    <polyline points="492,462 492,492 462,492"/>
  </g>
</svg>
