    <path d="M104 150 C92 150 86 130 88 112 L152 112 C152 138 134 150 116 150 Z"/>
    <path d="M86 96 C90 70 110 55 132 57 C151 59 161 78 159 100 L152 112 L88 112 Z"/>
    <path d="M54 110 C70 91 182 85 198 112 C191 123 150 127 120 127 C92 127 62 122 54 110 Z"/>
  </g>
  <!-- neon rim light -->
  <g stroke="url(#neon)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M86 96 C90 70 110 55 132 57 C151 59 161 78 159 100"/>
    <path d="M54 110 C70 91 182 85 198 112"/>
    <path d="M198 112 C191 123 150 127 120 127 C92 127 62 122 54 110"/>
    <path d="M38 232 C42 176 70 150 96 145"/>
    <path d="M150 150 C176 159 197 186 202 232"/>
    <path d="M96 145 C97 161 101 177 110 179"/>
  </g>
  <!-- glowing eye -->
  <ellipse cx="121" cy="127" rx="9" ry="5.5" fill="url(#eye)" filter="url(#glow)" transform="rotate(-12 121 127)"/>
</svg>
