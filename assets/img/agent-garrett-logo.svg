<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" fill="none" role="img" aria-label="Agent Garrett">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c026ff"/>
      <stop offset="0.5" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#7a1fff"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#aeffff"/>
      <stop offset="0.55" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0077aa"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- silhouette (near-black, reads on dark bg) -->
